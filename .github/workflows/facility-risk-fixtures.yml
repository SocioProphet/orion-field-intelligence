name: Facility Risk Fixtures

on:
  push:
    paths:
      - 'schemas/**'
      - 'fixtures/facility-risk/**'
      - 'scripts/validate_facility_risk_fixtures.py'
      - 'docs/integrations/OSIRIS_EXCAVATION_MAP_MVP.md'
      - '.github/workflows/facility-risk-fixtures.yml'
  pull_request:
    paths:
      - 'schemas/**'
      - 'fixtures/facility-risk/**'
      - 'scripts/validate_facility_risk_fixtures.py'
      - 'docs/integrations/OSIRIS_EXCAVATION_MAP_MVP.md'
      - '.github/workflows/facility-risk-fixtures.yml'

jobs:
  validate-facility-risk-fixtures:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Validate Orion facility-risk fixtures
        run: python3 scripts/validate_facility_risk_fixtures.py
